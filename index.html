<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>心理師姓名｜成人與伴侶諮商</title>
<meta name="description" content="心理師姓名，提供成人個別與伴侶諮商。">

<style>
:root{
  --maxw: 1000px;
  --pad: clamp(20px,4vw,60px);
  --h1: clamp(28px,4vw,48px);
  --text: clamp(16px,1.6vw,18px);
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;
  line-height:1.8;
  font-size:var(--text);
  color:#111;
}

/* ===== 投影片滾動 ===== */
main{
  height:100vh;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}

section{
  min-height:100vh;
  scroll-snap-align:start;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:var(--pad);
}

/* ===== 首頁背景 ===== */
#home{
  position:relative;
  color:white;
}

#home::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.35)),
    url("assets/bg.jpeg");
  background-size:cover;
  background-position:center;
  z-index:-1;
}

.container{
  max-width:var(--maxw);
  width:100%;
}

.hero{
  display:grid;
  gap:30px;
}

@media(min-width:900px){
  .hero{
    grid-template-columns:1.2fr .8fr;
    align-items:center;
  }
}

h1{
  font-size:var(--h1);
  margin:0 0 15px;
}

.avatar{
  width:min(260px,70vw);
  aspect-ratio:1/1;
  border-radius:50%;
  object-fit:cover;
  border:4px solid white;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.btn{
  display:inline-block;
  padding:10px 16px;
  border-radius:12px;
  background:rgba(255,255,255,.2);
  color:white;
  text-decoration:none;
  font-weight:600;
  margin-top:15px;
  border:1px solid rgba(255,255,255,.4);
}

.btn:hover{opacity:.8;}

/* 其他頁面 */
.card{
  max-width:800px;
  margin:auto;
}

h2{margin-top:0;}
</style>
</head>

<body>

<main>

<!-- 首頁 -->
<section id="home">
  <div class="container hero">
    <div>
      <h1>心理師姓名</h1>
      <p>成人個別｜伴侶關係｜情緒與壓力調適</p>
      <p>一句簡短介紹你的專業與陪伴風格。</p>

      <a class="btn" href="https://lin.ee/你的LINE連結" target="_blank">
        LINE 預約
      </a>
    </div>

    <div style="text-align:center;">
      <img class="avatar" src="assets/headshot.jpeg" alt="心理師照片">
    </div>
  </div>
</section>

<!-- 第二頁 -->
<section>
  <div class="card">
    <h2>服務項目</h2>
    <ul>
      <li>成人個別諮商</li>
      <li>伴侶諮商</li>
    </ul>
  </div>
</section>

<!-- 第三頁 -->
<section>
  <div class="card">
    <h2>學經歷</h2>
    <p>某某大學 諮商心理學碩士</p>
    <p>醫院心理治療中心 心理師</p>
  </div>
</section>

<!-- 第四頁 -->
<section>
  <div class="card">
    <h2>聯絡方式</h2>
    <p>
      LINE：<a href="https://lin.ee/你的LINE連結">點我加入</a><br>
      Email：hello@example.com
    </p>
  </div>
</section>

</main>

</body>
</html>
